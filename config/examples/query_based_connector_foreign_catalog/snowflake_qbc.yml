# Query-Based Connector (QBC) example — Foreign Catalog Ingestion (Snowflake)
#
# Use connector_type: QBC_FOREIGN_CATALOG when the source is a Unity Catalog foreign catalog
# (e.g. a Snowflake catalog exposed via UC federation) rather than a direct database connection.
#
# Key differences from connector_type: QBC (foreign connection ingestion):
#   - No "connection:" block — source is a UC foreign catalog, not a UC connection
#   - "databases[].name" maps to the foreign catalog name (source_catalog in the pipeline)
#   - Tables may have an optional "primary_keys" field
#   - A "pipeline_configuration:" block may be needed for certain source types (see below)
#
# QBC uses serverless compute; no gateway pipeline or cluster config is required.

env: "dev"
app_name: "snowflake_federated_qbc"

connector_type: QBC_FOREIGN_CATALOG

# No "connection:" block — source identity comes from the UC foreign catalog below.

# Pipeline-level Spark configuration.
# `spark.databricks.delta.properties.defaults.feature.timestampNtz = "supported"` is required when source tables contain TIMESTAMP_NTZ columns (common with Snowflake Managed Iceberg tables).
# Note: This may be included as default in future releases of the connector, which may mean this block is not needed in the future.
pipeline_configuration:
  spark.databricks.delta.properties.defaults.feature.timestampNtz: "supported"

unity_catalog:
  global_uc_catalog: "lf_connect_demo_catalog"

# QBC defaults — applied to all tables unless overridden per-table
qbc:
  default_cursor_column: "ORDER_TS"   # Column used for incremental reads
  default_scd_type: "SCD_TYPE_1"      # SCD_TYPE_1, SCD_TYPE_2, or APPEND_ONLY

# Source foreign catalogs and tables to ingest.
# Each "databases" entry is a UC foreign catalog (not a traditional database).
# QBC requires use_schema_ingestion: false — tables must be listed explicitly.
databases:
  - name: amenon_snowflake_federated_iceberg   # Unity Catalog foreign catalog name (source_catalog)
    # uc_catalog: "lf_connect_another"           # Destination catalog in Unity Catalog. Can override `global_uc_catalog`
    schemas:
      - name: benchmark
        use_schema_ingestion: false
        tables:
          - source_table: orders_iceberg_direct_smaller
            primary_keys: ["ORDER_ID"]   # Optional: set if the table has a primary key
            # cursor_column: "ORDER_TS"  # inherits default_cursor_column
            destination_schema: "default" # Optional: in case destination schema name is different from the source schema name
          - source_table: orders_native_smaller
            primary_keys: ["ORDER_ID"]
            # cursor_column: "ORDER_TS"  # inherits default_cursor_column
            destination_schema: "default" # Optional: in case destination schema name is different from the source schema name
          # - source_table: order_items
          #   primary_keys: ["ITEM_ID"]
          #   cursor_column: "UPDATED_AT"
          #   scd_type: "SCD_TYPE_2"     # track full history

  # - name: my_other_snowflake_catalog
  #   uc_catalog: "another_dest_catalog"
  #   schemas:
  #     - name: sales
  #       use_schema_ingestion: false
  #       tables:
  #         - source_table: customers
  #           primary_keys: ["CUSTOMER_ID"]
  #         - source_table: transactions
  #           cursor_column: "TXN_DATE"
  #           scd_type: "APPEND_ONLY"

# Event log configuration
event_log:
  to_table: true

# Job orchestration — QBC_FOREIGN_CATALOG always uses the common schedule
job:
  common_job_for_all_pipelines: true
  common_schedule:
    quartz_cron_expression: "0 0 * * * ?"   # Run every hour
    timezone_id: "UTC"
